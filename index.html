<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #010131;
  --bg2:    #0A0C26;
  --card:   #121140;
  --accent: #5391D5;
  --text:   #FEFFF9;
  --muted:  rgba(254,255,249,0.55);
  --dim:    rgba(254,255,249,0.28);
  --stroke: rgba(83,145,213,0.18);
  --cbdr:   rgba(83,145,213,0.10);
  --abg:    rgba(83,145,213,0.10);
}

html { background: var(--bg); }

body {
  font-family: 'Open Sans', sans-serif;
  font-weight: 400;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 0 60px;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -160px; left: 50%;
  transform: translateX(-50%);
  width: 480px; height: 480px;
  background: radial-gradient(ellipse, rgba(83,145,213,0.08) 0%, transparent 68%);
  pointer-events: none; z-index: 0;
}

.wrap {
  width: 100%; max-width: 420px;
  position: relative; z-index: 1;
  padding: 0 18px;
}

/* ── Header ── */
.header {
  display: flex; flex-direction: column; align-items: center;
  padding: 48px 0 30px;
}

.logo-wrap { width: 128px; margin-bottom: 26px; }
.logo-wrap img { width: 100%; display: block; border-radius: 6px; mix-blend-mode: screen; }
.logo-wrap img { width: 100%; display: block; }

.bar {
  width: 40px; height: 2px;
  background: var(--accent);
  margin: 0 auto 20px;
  border-radius: 1px;
}

.eyebrow {
  font-size: 0.6rem; font-weight: 700;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--accent); text-align: center;
  margin-bottom: 10px;
}

h1 {
  font-size: 1.65rem; font-weight: 700;
  letter-spacing: -0.01em; color: var(--text);
  text-align: center; line-height: 1.15;
  margin-bottom: 8px;
}

.creds {
  font-size: 0.65rem; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--accent); text-align: center;
  margin-bottom: 7px; min-height: 1em;
}

.role {
  font-size: 0.75rem; font-weight: 400;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); text-align: center;
}

/* ── Panels ── */
.panel {
  background: var(--card);
  border: 1px solid var(--stroke);
  border-radius: 14px;
  padding: 20px 20px 8px;
  margin-bottom: 12px;
}

.plabel {
  font-size: 0.6rem; font-weight: 700;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 14px;
}

/* ── Contact Rows ── */
.crow {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 9px 0; border-bottom: 1px solid var(--cbdr);
  text-decoration: none; color: inherit;
  transition: opacity 0.16s;
}
.crow:last-child { border-bottom: none; padding-bottom: 12px; }
a.crow:hover { opacity: 0.7; }

.icow {
  width: 31px; height: 31px; border-radius: 7px;
  background: var(--abg); border: 1px solid var(--stroke);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.icow svg { width: 14px; height: 14px; fill: var(--accent); display: block; }

.cc { flex: 1; min-width: 0; }

.clabel {
  font-size: 0.58rem; font-weight: 700;
  letter-spacing: 0.13em; text-transform: uppercase;
  color: var(--dim); margin-bottom: 2px;
}

.cval {
  font-size: 0.83rem; font-weight: 400;
  color: var(--text); line-height: 1.45;
  word-break: break-word;
}
.cval.sm { font-size: 0.77rem; }

/* ── Address ── */
.addr-panel {
  background: var(--card);
  border: 1px solid var(--stroke);
  border-radius: 14px;
  padding: 20px; margin-bottom: 12px;
}

.agrid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

.acity {
  font-size: 0.6rem; font-weight: 700;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 5px;
}

.atxt {
  font-size: 0.75rem; color: var(--muted); line-height: 1.65;
}

/* ── Buttons ── */
.btns { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }

.btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 13px 18px; border-radius: 10px;
  font-family: 'Open Sans', sans-serif;
  font-size: 0.75rem; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  text-decoration: none; cursor: pointer; border: none;
  transition: transform 0.13s, opacity 0.13s;
}
.btn:active { transform: scale(0.97); }
.btn svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }

.btn-fill  { background: var(--accent); color: var(--bg); }
.btn-fill:hover { opacity: 0.87; }
.btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--stroke); }
.btn-ghost:hover { background: var(--abg); }

/* ── QR dual panel ── */
.qr-panel {
  background: var(--card);
  border: 1px solid var(--stroke);
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 12px;
}

.qr-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.qr-item {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}

.qr-box { background: #fff; border-radius: 8px; padding: 8px; position: relative; display: inline-block; }
.qr-box canvas, .qr-box img { display: block; border-radius: 3px; }
.qr-logo {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 32px; height: 32px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}

.qrnote {
  font-size: 0.63rem; color: var(--dim);
  text-align: center; line-height: 1.5;
}

/* ── "Add to Home Screen" tip ── */
.homescreen-tip {
  background: var(--card);
  border: 1px solid var(--stroke);
  border-radius: 14px;
  padding: 16px 18px;
  margin-bottom: 12px;
  display: flex; align-items: flex-start; gap: 12px;
}

.tip-icon {
  width: 31px; height: 31px; border-radius: 7px;
  background: var(--abg); border: 1px solid var(--stroke);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.tip-icon svg { width: 14px; height: 14px; fill: var(--accent); }

.tip-text { flex: 1; }
.tip-title {
  font-size: 0.68rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 4px;
}
.tip-body {
  font-size: 0.72rem; color: var(--muted); line-height: 1.55;
}

/* ── Footer ── */
.foot {
  text-align: center; margin-top: 8px;
  font-size: 0.6rem; font-weight: 700;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--dim);
}

/* ── Not found screen ── */
.notfound {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 60vh; text-align: center;
  gap: 16px; padding: 40px 18px;
}
.notfound .nf-icon svg { width: 48px; height: 48px; fill: var(--dim); }
.notfound h2 { font-size: 1.1rem; font-weight: 700; color: var(--text); }
.notfound p  { font-size: 0.82rem; color: var(--muted); line-height: 1.6; max-width: 280px; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 26px; left: 50%;
  transform: translateX(-50%) translateY(68px);
  background: var(--accent); color: var(--bg);
  font-family: 'Open Sans', sans-serif;
  font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 10px 20px; border-radius: 100px; z-index: 999;
  transition: transform 0.27s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── Entrance animations ── */
@keyframes fadeUp  { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes barGrow { from{opacity:0;transform:scaleX(0)} to{opacity:1;transform:scaleX(1)} }

.a {
  opacity: 0;
  animation-fill-mode: both;
  animation-duration: 0.52s;
  animation-timing-function: cubic-bezier(.18,0,.08,1);
  animation-name: fadeUp;
}
</style>
</head>

/* ================================================================
   VCF GENERATOR
================================================================ */
function saveContact() {
  var p   = window.__person;
  var url = window.__cardURL || window.location.href;
  if (!p) return;

  var lines = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'FN:' + p.name,
    'TITLE:' + p.title,
    'ORG:Virginia Institute of Finance and Management (VIFM)'
  ];

  if (p.credentials) lines.push('NOTE:' + p.credentials);
  if (p.email)        lines.push('EMAIL;TYPE=WORK:' + p.email);

  (p.officePhone || []).forEach(function(ph) {
    lines.push('TEL;TYPE=WORK,VOICE:' + ph.replace(/\s/g,''));
  });

  if (p.mobile) lines.push('TEL;TYPE=CELL:' + p.mobile.replace(/\s/g,''));
  if (p.website) lines.push('URL:' + p.website);

  (p.offices || []).forEach(function(o) {
    lines.push('ADR;TYPE=WORK:;;' + o.address.join('\\, ') + ';' + o.city + ';;;');
  });

  if (p.linkedin) lines.push('X-SOCIALPROFILE;TYPE=linkedin:' + p.linkedin);

  lines.push('END:VCARD');

  var vcf  = lines.join('\n');
  var blob = new Blob([vcf], { type: 'text/vcard;charset=utf-8' });
  var a    = document.createElement('a');
  a.href   = URL.createObjectURL(blob);
  a.download = p.name.replace(/\s+/g,'-') + '-VIFM.vcf';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  showToast('Contact saved!');
}

/* ================================================================
   TOAST
================================================================ */
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2600);
}
